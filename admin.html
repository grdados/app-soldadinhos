<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Admin | Soldadinhos de Jesus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <header class="admin-header">
      <div class="admin-container admin-header-wrap">
        <div>
          <p class="eyebrow">Painel Administrativo</p>
          <h1>Gestão do Projeto Soldadinhos de Jesus</h1>
        </div>
        <div class="admin-header-actions">
          <a class="btn btn-light" href="index.html">Voltar ao site</a>
          <button class="btn btn-muted" id="logoutAdmin" type="button">Sair</button>
        </div>
      </div>
    </header>

    <main class="admin-container admin-main">
      <section class="admin-panel">
        <div class="panel-head">
          <h2>Configuração do Cloudinary</h2>
        </div>
        <form id="cloudForm" class="admin-form compact-form">
          <label>
            Cloud Name
            <input id="cloudName" placeholder="ex: grdados" required />
          </label>
          <label>
            Upload Preset (unsigned)
            <input id="uploadPreset" placeholder="ex: soldadinhos_upload" required />
          </label>
          <label>
            Largura padrão das imagens
            <select id="imageWidth">
              <option value="800">800px</option>
              <option value="1200">1200px</option>
              <option value="1600">1600px</option>
            </select>
          </label>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Salvar configuração</button>
            <span id="cloudStatus" class="form-status" aria-live="polite"></span>
          </div>
        </form>
      </section>

      <section class="admin-tabs-panel">
        <div class="admin-tabs" role="tablist" aria-label="Menu de gestão">
          <button class="admin-tab is-active" type="button" data-tab="memories">Criar Memórias</button>
          <button class="admin-tab" type="button" data-tab="soldiers">Criar Cartão de Soldadinho</button>
        </div>

        <div class="admin-tab-panels">
          <section class="admin-tab-panel is-active" id="tab-memories" data-panel="memories">
            <div class="admin-panel">
              <div class="panel-head">
                <h2>Eventos (hero + galeria)</h2>
                <button type="button" class="btn btn-danger" id="resetEvents">Restaurar padrão</button>
              </div>
              <form id="eventForm" class="admin-form">
                <input type="hidden" id="eventIndex" value="" />
                <label>
                  Título do evento
                  <input id="eventTitle" required />
                </label>
                <label>
                  Data do evento
                  <input id="eventDate" type="date" />
                </label>
                <label class="full-col">
                  Resumo do evento
                  <textarea id="eventSummary" rows="3"></textarea>
                </label>
                <label class="full-col">
                  URLs das fotos (1 por linha)
                  <textarea id="eventPhotoUrls" rows="5" placeholder="https://...&#10;https://..."></textarea>
                </label>
                <label class="full-col">
                  Upload de fotos (múltiplas)
                  <input id="eventPhotoFiles" type="file" accept="image/*" multiple />
                </label>
                <div class="form-actions full-col">
                  <button type="submit" class="btn btn-primary">Salvar evento</button>
                  <button type="button" class="btn btn-muted" id="cancelEventEdit">Cancelar edição</button>
                  <span id="eventStatus" class="form-status" aria-live="polite"></span>
                </div>
              </form>
              <div id="eventList" class="admin-list"></div>
            </div>

          </section>

          <section class="admin-tab-panel" id="tab-soldiers" data-panel="soldiers">
            <div class="admin-panel">
              <div class="panel-head">
                <h2>Cartão de Soldadinho</h2>
                <button type="button" class="btn btn-danger" id="resetSoldiers">Restaurar padrão</button>
              </div>
              <form id="soldierForm" class="admin-form">
                <input type="hidden" id="soldierIndex" value="" />
                <label>
                  Nome
                  <input id="soldierName" required />
                </label>
                <label>
                  Habilidade principal
                  <input id="soldierRole" required placeholder="ex: Louvor e Alegria" />
                </label>
                <label class="full-col">
                  Características (separadas por vírgula)
                  <input id="soldierTraits" placeholder="ex: Educação, Energia, Brincalhão" />
                </label>
                <label class="full-col">
                  Medalhas (separadas por vírgula)
                  <input id="soldierMedals" placeholder="ex: Coragem, Fé, Amizade" />
                </label>
                <label>
                  URL da foto (opcional)
                  <input id="soldierPhoto" type="url" />
                </label>
                <label>
                  Upload da foto
                  <input id="soldierFile" type="file" accept="image/*" />
                </label>
                <div class="form-actions full-col">
                  <button type="button" class="btn btn-muted" id="uploadSoldierImage">Enviar foto</button>
                  <button type="submit" class="btn btn-primary">Salvar soldadinho</button>
                  <button type="button" class="btn btn-muted" id="cancelSoldierEdit">Cancelar edição</button>
                  <span id="soldierUploadStatus" class="upload-status"></span>
                  <span id="soldierStatus" class="form-status" aria-live="polite"></span>
                </div>
              </form>
              <div id="soldierList" class="admin-list"></div>
            </div>
          </section>

        </div>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
