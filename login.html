<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin | Soldadinhos de Jesus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-shell">
        <div class="login-visual">
          <div class="visual-brand">
            <img src="assets/logo-soldadinhos.png" alt="Logo Soldadinhos" />
            <span>Admin GR Dados</span>
          </div>
          <h1>Olá, bem-vindo!</h1>
          <p>
            Acesse o painel administrativo para cadastrar memórias, soldadinhos e
            atualizações do projeto.
          </p>
        </div>

        <div class="login-form-panel">
          <h2>Acesso Administrativo</h2>
          <p class="login-sub">Informe seus dados para entrar no painel.</p>

          <form id="loginForm" class="login-form" novalidate>
            <label>
              E-mail
              <input id="loginEmail" type="email" placeholder="name@mail.com" required />
            </label>
            <label>
              Senha
              <input id="loginPassword" type="password" placeholder="********" required />
            </label>
            <div class="login-actions">
              <button type="submit" class="btn btn-primary">Entrar</button>
              <a href="index.html" class="btn btn-outline">Voltar ao site</a>
            </div>
            <p id="loginStatus" class="login-status" aria-live="polite"></p>
          </form>

          <p class="login-help">
            Credencial inicial: <strong>grdados.oficial@gmail.com</strong> | senha:
            <strong>123456</strong>
          </p>
        </div>
      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>
